kind = "web"
previewPath = "/"
title = "THB Nexus AI Trader"
version = "1.0.0"
id = "artifacts/thb-nexus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23939

[services.development]
run = "pnpm --filter @workspace/thb-nexus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thb-nexus", "run", "build" ]
publicDir = "artifacts/thb-nexus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23939"
BASE_PATH = "/"
